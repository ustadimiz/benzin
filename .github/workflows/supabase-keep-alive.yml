name: Supabase Keep Alive

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY GitHub secrets"
            exit 1
          fi

          URL="$SUPABASE_URL/rest/v1/profiles?select=id&limit=1"

          STATUS=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            --max-time 20 \
            --retry 2 \
            --retry-delay 2 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$URL")

          echo "HTTP status: $STATUS"
          echo "Response:"
          cat /tmp/resp.txt

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Keep-alive ping failed"
            exit 1
          fi
